name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/plantio

jobs:
  # ── 1. Тесты каждого сервиса параллельно ───────────────────────────────────
  test:
    name: Test / ${{ matrix.service }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-service
          - plants-service
          - feed-service
          - notifications-service
          - api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: services/${{ matrix.service }}/.build
          key: spm-${{ matrix.service }}-${{ hashFiles(format('services/{0}/Package.resolved', matrix.service)) }}
          restore-keys: spm-${{ matrix.service }}-

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: swift test --parallel

  # ── 2. Сборка и пуш Docker-образов (только main) ──────────────────────────
  build:
    name: Build / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api-gateway
            image: api-gateway
          - service: identity-service
            image: identity-service
          - service: plants-service
            image: plants-service
          - service: feed-service
            image: feed-service
          - service: notifications-service
            image: notifications-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── 3. Smoke-тест: поднять стек и проверить /health ───────────────────────
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env
        run: cp .env.ci .env && cp .env.ci .env.prod

      - name: Start full stack
        run: docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml up -d
        timeout-minutes: 10

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Gateway is up"
              break
            fi
            echo "Attempt $i/30 — retrying in 5s..."
            sleep 5
          done

      - name: Health checks
        run: |
          curl -sf http://localhost:3000/health | grep OK
          curl -sf http://localhost:3001/health | grep OK
          curl -sf http://localhost:3002/health | grep OK
          curl -sf http://localhost:3003/health | grep OK
          curl -sf http://localhost:3004/health | grep OK
          echo "All services healthy"

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── 4. Деплой на VPS по SSH (только main, после smoke) ────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: smoke
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/plantio

            # Авторизация в ghcr.io
            echo "${{ secrets.CR_PAT }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Обновить образы и перезапустить
            docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml up -d --remove-orphans

            # Проверить что всё живо
            sleep 15
            curl -sf http://localhost:3000/health | grep OK
            echo "Deploy successful"
