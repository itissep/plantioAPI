x-common-vars: &common-vars
  env_file:
    - .env.prod

services:
  postgres:
    <<: *common-vars
    image: postgres:16-alpine
    container_name: plantio-postgres
    restart: always
    environment:
      POSTGRES_MULTIPLE_DATABASES: ${IDENTITY_DB},${PLANTS_DB},${FEED_DB},${GATEWAY_DB},${NOTIFICATIONS_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init-multiple-dbs.sh:/docker-entrypoint-initdb.d/00-create-multiple-dbs.sh:ro

  rabbitmq:
    <<: *common-vars
    image: rabbitmq:3-management-alpine
    container_name: plantio-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api-gateway:
    <<: *common-vars
    image: ghcr.io/itissep/plantio-api-gateway:latest
    restart: always
    depends_on:
      - postgres
      - identity-service
      - plants-service
      - feed-service
      - notifications-service
    environment:
      DATABASE_NAME: ${GATEWAY_DB}
      IDENTITY_SERVICE_URL: http://identity-service:3001
      PLANTS_SERVICE_URL: http://plants-service:3002
      FEED_SERVICE_URL: http://feed-service:3003
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3004

  identity-service:
    <<: *common-vars
    image: ghcr.io/itissep/plantio-identity-service:latest
    restart: always
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_NAME: ${IDENTITY_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672${RABBITMQ_VHOST}
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3004

  plants-service:
    <<: *common-vars
    image: ghcr.io/itissep/plantio-plants-service:latest
    restart: always
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_NAME: ${PLANTS_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672${RABBITMQ_VHOST}
      MEDIA_PATH: /app/media/uploads
    volumes:
      - plants_media:/app/media/uploads

  feed-service:
    <<: *common-vars
    image: ghcr.io/itissep/plantio-feed-service:latest
    restart: always
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_NAME: ${FEED_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672${RABBITMQ_VHOST}

  notifications-service:
    <<: *common-vars
    image: ghcr.io/itissep/plantio-notifications-service:latest
    restart: always
    depends_on:
      - rabbitmq
    environment:
      DATABASE_NAME: ${NOTIFICATIONS_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672${RABBITMQ_VHOST}

  nginx:
    image: nginx:alpine
    container_name: plantio-nginx
    restart: always
    depends_on:
      - api-gateway
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"

volumes:
  postgres_data:
  rabbitmq_data:
  plants_media:

